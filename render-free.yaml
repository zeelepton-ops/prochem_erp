services:
  - type: web
    name: bmm-backend-free
    runtime: node
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_HOST
        value: db.glfywcqebopgvpglxiud.supabase.co
      - key: DB_PORT
        value: 5432
      - key: DB_NAME
        value: postgres
      - key: DB_USER
        value: postgres
      - key: DB_PASSWORD
        value: prochemdbms
      - key: DB_SSL
        value: require
      - key: JWT_SECRET
        value: your_jwt_secret_key_change_in_production
      - key: JWT_EXPIRY
        value: 7d
      - key: FRONTEND_URL
        value: https://erp.prochemtechnology.com
      - key: LOG_LEVEL
        value: info