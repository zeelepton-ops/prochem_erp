services:
  - type: web
    name: prochem-erp-backend
    env: docker
    region: oregon
    branch: main
    dockerfilePath: backend/Dockerfile
    plan: starter
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000

databases:
  - name: prochem-erp-db
    plan: starter
    databaseName: prochem_erp
